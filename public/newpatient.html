<html>

  <head>
    <meta charset="UTF-8">
    <title>New Patient</title>
    <link rel="stylesheet" type="text/css" href="./css/style.css" /> 
  </head>

  <body>
    <div>
        <h1>Registra Paziente</h1>
    </div>

    <form method="POST" action="/showdata">
    <div>
      
        <div>
          <label for="name">Nome</label>
          <input type="text" id="name" name="name" required>
          <label for="email">Email</label>
          <input type="email" id="email" name="email">
        </div>

        <div>
          <label for="surname">Cognome</label>
          <input type="text" id="surname" name="surname" required>
          <label for="tel">Telefono</label>
          <input type="tel" id="tel" name="tel" required>
        </div>

        <div>
          <label for="cf">Codice fiscale</label>
          <input type="text" id="cf" name="cf" required>
          <label for="date_birth">Data di nasita</label>
          <input type="date" id="date_birth" name="date_birth" required>
        </div>

        <div>
          <label for="anamnesis">Anamnesi</label>
        </div>
        <div>
          <textarea type="anamnesis" name="anamnesis"></textarea>
        </div> 

      
    </div>

    <button type="submit">Conferma</button>
    
    </form>
  </body>
</html>
